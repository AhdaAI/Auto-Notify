stages:
  - validate
  - deploy

variables:
  FUNCTION_NAME: auto-notify
  GCP_PROJECT_NUMBER: "123456789012"
  GCP_POOL_ID: "auto-notify"
  GCP_PROVIDER_ID: "gitlab"

.on_main: &on_main
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "**/*.py"
        - requirements.txt
        - .gitlab-ci.yml

validate:
  stage: validate
  image: python:3.13-slim
  before_script:
    - pip install -q -r requirements.txt
  script:
    - python -m py_compile main.py Utility.py Google.py embed_builder.py APIResponseDict.py SecretManager.py
  <<: *on_main

deploy:
  stage: deploy
  needs:
    - validate
  image: google/cloud-sdk:slim
  id_tokens:
    GCP_OIDC_TOKEN:
      aud: "https://iam.googleapis.com/projects/${GCP_PROJECT_NUMBER}/locations/global/workloadIdentityPools/${GCP_POOL_ID}/providers/${GCP_PROVIDER_ID}"
  before_script:
    - echo "${GCP_OIDC_TOKEN}" > /tmp/gcp_oidc_token
    - >
      gcloud iam workload-identity-pools create-cred-config
      "projects/${GCP_PROJECT_NUMBER}/locations/global/workloadIdentityPools/${GCP_POOL_ID}/providers/${GCP_PROVIDER_ID}"
      --service-account="${GCP_SERVICE_ACCOUNT}"
      --output-file=/tmp/gcp_cred_config.json
      --credential-source-file=/tmp/gcp_oidc_token
    - export CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=/tmp/gcp_cred_config.json
    - gcloud config set project "$GOOGLE_CLOUD_PROJECT"
    - gcloud components update --quiet
  <<: *on_main
  script:
    - >
      gcloud functions deploy "$FUNCTION_NAME"
      --gen2
      --runtime python313
      --region "$GOOGLE_CLOUD_REGION"
      --source .
      --entry-point cloud_function_entrypoint
      --trigger-http
      --no-allow-unauthenticated
      --service-account "$FUNCTION_SERVICE_ACCOUNT"
      --set-env-vars "GOOGLE_CLOUD_PROJECT=$GOOGLE_CLOUD_PROJECT,GOOGLE_DATABASE=$GOOGLE_DATABASE,AUTO_NOTIFY_COLLECTION=$AUTO_NOTIFY_COLLECTION"
      --timeout 60
      --quiet
    - |
      FUNCTION_URI=$(gcloud functions describe "$FUNCTION_NAME" \
        --gen2 \
        --region "$GOOGLE_CLOUD_REGION" \
        --format="value(serviceConfig.uri)")
      if gcloud scheduler jobs describe "$FUNCTION_NAME" --location "$GOOGLE_CLOUD_REGION" &>/dev/null; then
        gcloud scheduler jobs update http "$FUNCTION_NAME" \
          --schedule="$CRON_SCHEDULE" \
          --uri="$FUNCTION_URI" \
          --location "$GOOGLE_CLOUD_REGION" \
          --oidc-service-account-email "$FUNCTION_SERVICE_ACCOUNT" \
          --oidc-token-scope "https://www.googleapis.com/auth/cloud-platform" \
          --quiet
      else
        gcloud scheduler jobs create http "$FUNCTION_NAME" \
          --schedule="$CRON_SCHEDULE" \
          --uri="$FUNCTION_URI" \
          --http-method POST \
          --time-zone "Asia/Jakarta" \
          --location "$GOOGLE_CLOUD_REGION" \
          --oidc-service-account-email "$FUNCTION_SERVICE_ACCOUNT" \
          --oidc-token-scope "https://www.googleapis.com/auth/cloud-platform" \
          --quiet
      fi
